name: Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Restore dependencies
        run: dotnet restore CUE4Parse.sln /p:Platform="Any CPU"

      - name: Build
        run: dotnet build CUE4Parse.sln --configuration Release --no-restore /p:Platform="Any CPU"

      - name: Pack NuGet packages
        run: dotnet pack CUE4Parse.sln --configuration Release --no-build --output ./artifacts /p:Platform="Any CPU"

      - name: Upload NuGet packages
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: ./artifacts/*.nupkg
